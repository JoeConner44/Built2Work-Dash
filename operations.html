<style>
:root{--bg:#0d0d0d;--surface:#161616;--surface2:#1e1e1e;--surface3:#252525;--border:#333;--accent:#ce0e2d;--text:#f0f0f0;--muted:#9a9a9a;--green:#3fb950;--blue:#58a6ff;--amber:#f0a500;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;font-size:14px;display:flex;flex-direction:column;}

/* LOADING */
#loadingScreen{position:fixed;inset:0;z-index:1000;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
.spinner{width:42px;height:42px;border:3px solid #333;border-top-color:#ce0e2d;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-family:'Barlow Condensed',sans-serif;font-size:13px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}

/* HEADER */
header{background:#111;border-bottom:3px solid #ce0e2d;padding:10px 22px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;box-shadow:0 2px 20px rgba(0,0,0,.5);}
.h-left{display:flex;align-items:center;gap:12px;}
.h-title h1{font-family:'Oswald',sans-serif;font-size:16px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:#e0e0e0;line-height:1;}
.h-title p{font-size:10px;color:#666;letter-spacing:2px;text-transform:uppercase;}
.h-controls{display:flex;align-items:center;gap:10px;}
.hbtn{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:5px 12px;border-radius:4px;cursor:pointer;transition:all .2s;text-decoration:none;display:inline-block;}
.hbtn-muted{border:1.5px solid var(--border);background:transparent;color:var(--muted);}
.hbtn-muted:hover{border-color:#ce0e2d;color:#ce0e2d;}
.hbtn-red{border:1.5px solid #ce0e2d;background:transparent;color:#ce0e2d;}
.hbtn-red:hover{background:#ce0e2d;color:#fff;}
.refresh-wrap{display:flex;align-items:center;gap:6px;}
.refresh-dot{width:7px;height:7px;border-radius:50%;background:#ce0e2d;animation:pulse 2.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.25;}}
.refresh-label{font-family:'Barlow Condensed',sans-serif;font-size:10px;color:var(--muted);letter-spacing:1px;}
#lastRefreshTime{color:#ce0e2d;font-weight:700;}

/* MULTI-SELECT EVENT PICKER */
.ms-wrap{position:relative;}
.ms-btn{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;background:var(--surface);border:1.5px solid var(--border);color:var(--text);padding:6px 30px 6px 12px;border-radius:4px;cursor:pointer;transition:border-color .2s;white-space:nowrap;position:relative;min-width:160px;text-align:left;}
.ms-btn::after{content:'\25BE';position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:10px;}
.ms-btn:hover,.ms-btn.open{border-color:#ce0e2d;}
.ms-btn .badge{display:inline-block;background:#ce0e2d;color:#fff;font-size:10px;font-weight:900;padding:0 5px;border-radius:2px;margin-left:6px;vertical-align:middle;}
.ms-panel{position:absolute;top:calc(100% + 4px);right:0;min-width:240px;background:var(--surface);border:1.5px solid var(--border);border-radius:4px;z-index:200;box-shadow:0 8px 28px rgba(0,0,0,.5);overflow:hidden;display:none;}
.ms-panel.open{display:block;}
.ms-all{padding:8px 14px;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);cursor:pointer;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;transition:background .15s;}
.ms-all:hover{background:var(--surface2);}
.ms-all.active{color:#ce0e2d;}
.ms-option{padding:8px 14px;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:10px;transition:background .15s;border-left:3px solid transparent;}
.ms-option:hover{background:var(--surface2);}
.ms-option.selected{border-left-color:var(--event-color,#ce0e2d);color:var(--text);}
.ms-check{width:14px;height:14px;border:1.5px solid var(--border);border-radius:2px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;transition:all .15s;}
.ms-option.selected .ms-check{background:var(--event-color,#ce0e2d);border-color:var(--event-color,#ce0e2d);color:#fff;}
.ms-divider{height:1px;background:var(--border);margin:2px 0;}

/* MAIN */
#mainContent{flex:1;overflow-y:auto;display:flex;flex-direction:column;}
.kpi-row{display:grid;gap:12px;padding:16px 18px 0;flex-shrink:0;}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-top:3px solid #ce0e2d;border-radius:4px;padding:12px 14px;}
.kpi-card.accent-green{border-top-color:var(--green);}
.kpi-card.accent-blue{border-top-color:var(--blue);}
.kpi-card.accent-amber{border-top-color:var(--amber);}
.kpi-label{font-family:'Oswald',sans-serif;font-size:10px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:3px;}
.kpi-value{font-family:'Oswald',sans-serif;font-size:26px;font-weight:700;line-height:1;color:#fff;}
.kpi-sub{font-size:11px;color:var(--muted);margin-top:2px;}

/* COMPARISON TABLE */
#compTable{display:none;padding:12px 18px 0;}
.comp-tbl{width:100%;border-collapse:collapse;font-family:'Barlow Condensed',sans-serif;}
.comp-tbl th{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);padding:6px 10px;text-align:left;border-bottom:1px solid var(--border);}
.comp-tbl td{font-size:13px;padding:7px 10px;border-bottom:1px solid #21262d;}
.comp-tbl tr:last-child td{border-bottom:none;}
.comp-tbl tr:hover td{background:var(--surface2);}
.comp-event-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:7px;flex-shrink:0;}

/* GRID */
.ops-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:14px 18px;}
.ops-grid .card.full{grid-column:span 2;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:14px;display:flex;flex-direction:column;}
.card-title{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;padding-bottom:7px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;}
.card-title .dot{width:5px;height:5px;transform:rotate(45deg);background:#ce0e2d;flex-shrink:0;margin-right:1px;}
.chart-wrap{flex:1;position:relative;}
.chart-note{font-family:'Barlow Condensed',sans-serif;font-size:10px;color:var(--muted);font-style:italic;text-align:center;margin-top:4px;}

/* DAY DRILL-DOWN */
.day-header{display:none;align-items:center;gap:14px;padding:12px 18px 0;flex-shrink:0;}
.day-header.visible{display:flex;}
.day-back-btn{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:5px 14px;border:1.5px solid var(--border);background:transparent;color:var(--muted);border-radius:4px;cursor:pointer;transition:all .2s;}
.day-back-btn:hover{border-color:#ce0e2d;color:#ce0e2d;}
.day-title{font-family:'Oswald',sans-serif;font-size:20px;font-weight:600;color:#fff;letter-spacing:1px;}
.day-subtitle{font-family:'Barlow Condensed',sans-serif;font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}

footer{text-align:center;padding:14px;color:var(--muted);font-size:11px;border-top:1px solid var(--border);font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;text-transform:uppercase;flex-shrink:0;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--surface);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:var(--muted);}

/* CASCADE TAB BUTTONS */
.cascade-tab{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:3px 10px;border:1.5px solid var(--border);background:transparent;color:var(--muted);border-radius:3px;cursor:pointer;transition:all .15s;}
.cascade-tab:hover{border-color:#ce0e2d;color:#ce0e2d;}
.cascade-tab.active{background:#ce0e2d;border-color:#ce0e2d;color:#fff;}

</style>
</head>

  document.getElementById('mainContent').style.display='flex';

// ── DATA FETCH ────────────────────────────────────────────────────────────────
async function fetchAll(table,cols='*'){
  const PAGE=1000;
  const {count,error:cErr}=await sb.from(table).select(cols,{count:'exact',head:true});
  if(cErr)throw cErr;
  if(!count||count===0)return[];
  const pages=Math.ceil(count/PAGE);
  const reqs=Array.from({length:pages},(_,i)=>sb.from(table).select(cols).range(i*PAGE,(i+1)*PAGE-1));
  const results=await Promise.all(reqs);
  const err=results.find(r=>r.error);if(err)throw err.error;
  return results.flatMap(r=>r.data||[]);
}
async function loadData(){
  setLoadingText('Loading operational data…');
  document.getElementById('loadingScreen').style.display='flex';
  try{
    const [web,exc,win]=await Promise.all([
      fetchAll('web_registration','"Date","Event Name","Mobile Phone"'),
      fetchAll('exc_truck_loading','"Date","Event Name","Login Code","Total Score"'),
      fetchAll('windows_trivia',   '"Date","Event Name","QR Code Scan","Mobile Phone"'),
    ]);
    rawWeb=web;rawExc=exc;rawWin=win;
    stamp();buildEventPicker();render();
    clearInterval(refreshTimer);
    refreshTimer=setInterval(refreshData,300000);
  }catch(err){alert('Error loading data: '+err.message);}
  finally{document.getElementById('loadingScreen').style.display='none';}
}
async function refreshData(){
  document.getElementById('loadingScreen').style.display='flex';
  setLoadingText('Refreshing…');
  try{
    const [web,exc,win]=await Promise.all([
      fetchAll('web_registration','"Date","Event Name","Mobile Phone"'),
      fetchAll('exc_truck_loading','"Date","Event Name","Login Code","Total Score"'),
      fetchAll('windows_trivia',   '"Date","Event Name","QR Code Scan","Mobile Phone"'),
    ]);
    rawWeb=web;rawExc=exc;rawWin=win;
    stamp();buildEventPicker();render();
  }catch(err){console.error('Refresh error:',err);}
  finally{document.getElementById('loadingScreen').style.display='none';}
}
function stamp(){document.getElementById('lastRefreshTime').textContent=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}

// ── EVENT PICKER ──────────────────────────────────────────────────────────────
function buildEventPicker(){
  const events=new Set();
  [...rawWeb,...rawExc,...rawWin].forEach(r=>{const e=(r['Event Name']||'').trim();if(e)events.add(e);});
  allEventNames=[...events].sort();
  const container=document.getElementById('msOptions');
  container.innerHTML='';
  allEventNames.forEach((name,i)=>{
    const color=EVENT_COLORS[i%EVENT_COLORS.length];
    const div=document.createElement('div');
    div.className='ms-option'+(selectedEvents.has(name)?' selected':'');
    div.style.setProperty('--event-color',color);
    div.innerHTML=`<span class="ms-check">${selectedEvents.has(name)?'&#10003;':''}</span><span class="comp-event-dot" style="background:${color}"></span>${esc(name)}`;
    div.onclick=()=>toggleEvent(name);
    container.appendChild(div);
  });
  updatePickerLabel();
}

function togglePicker(){
  const btn=document.getElementById('msBtn');
  const panel=document.getElementById('msPanel');
  const open=panel.classList.toggle('open');
  btn.classList.toggle('open',open);
  if(open){
    // Close on outside click
    setTimeout(()=>document.addEventListener('click',closePicker,{once:true}),0);
  }
}
function closePicker(e){
  const wrap=document.getElementById('msWrap');
  if(!wrap.contains(e.target)){
    document.getElementById('msPanel').classList.remove('open');
    document.getElementById('msBtn').classList.remove('open');
  }
}
function selectAll(){
  selectedEvents.clear();
  selectedDay=null;
  buildEventPicker();
  render();
}
function toggleEvent(name){
  if(selectedEvents.has(name)) selectedEvents.delete(name);
  else selectedEvents.add(name);
  // If all events selected manually, treat as "all"
  if(selectedEvents.size===allEventNames.length) selectedEvents.clear();
  selectedDay=null;
  buildEventPicker();
  render();
}
function updatePickerLabel(){
  const btn=document.getElementById('msBtn');
  const allCheck=document.getElementById('msAllCheck');
  if(selectedEvents.size===0){
    btn.innerHTML='All Events';
    allCheck.innerHTML='&#10003;';
    document.getElementById('msAll').classList.add('active');
  } else if(selectedEvents.size===1){
    btn.textContent=[...selectedEvents][0];
    allCheck.innerHTML='';
    document.getElementById('msAll').classList.remove('active');
  } else {
    btn.innerHTML='Events <span class="badge">'+selectedEvents.size+'</span>';
    allCheck.innerHTML='';
    document.getElementById('msAll').classList.remove('active');
  }
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function parseDate(str){if(!str)return null;const d=new Date(str);return isNaN(d)?null:d;}
function toYMD(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function median(arr){if(!arr.length)return null;const s=[...arr].sort((a,b)=>a-b),m=Math.floor(s.length/2);return s.length%2?s[m]:(s[m-1]+s[m])/2;}
function avg(arr){return arr.length?arr.reduce((a,b)=>a+b,0)/arr.length:null;}
// normalizePhone() lives in shared.js
function fmtMin(m){if(m==null)return '—';return m<60?m.toFixed(0)+' min':(m/60).toFixed(1)+' hrs';}
function fmtPct(n,d){return d>0?(n/d*100).toFixed(1)+'%':'—';}
function fmtHour(h){return h===0?'12 AM':h<12?h+' AM':h===12?'12 PM':(h-12)+' PM';}

function filterRows(rows,field){
  if(selectedEvents.size===0)return rows;
  return rows.filter(r=>selectedEvents.has((r['Event Name']||'').trim()));
}

function computeData(webRows,excRows,winRows){
  const excTimeMap=new Map(),excScoreMap=new Map();
  excRows.forEach(r=>{
    const p=normalizePhone(r['Login Code']||''),d=parseDate(r['Date']),s=parseFloat(r['Total Score']);
    if(!p||!d)return;
    if(!excTimeMap.has(p)||d<excTimeMap.get(p))excTimeMap.set(p,d);
    if(!isNaN(s)){if(!excScoreMap.has(p))excScoreMap.set(p,[]);excScoreMap.get(p).push(s);}
  });
  const winTimeMap=new Map();
  winRows.forEach(r=>{
    const p=normalizePhone(r['QR Code Scan']||r['Mobile Phone']||''),d=parseDate(r['Date']);
    if(p&&d){if(!winTimeMap.has(p)||d<winTimeMap.get(p))winTimeMap.set(p,d);}
  });
  const excWaitMin=[],excWaitByHour={},excWaitByDay={};
  const winWaitMin=[],winWaitByDay={};
  const excScoreAll=[],excScoreByHour={},excScoreByDay={};
  const webPhones=new Set(),excPhones=new Set(),winPhones=new Set();

  webRows.forEach(r=>{
    const p=normalizePhone(r['Mobile Phone']||''),regTime=parseDate(r['Date']);
    if(!p||!regTime)return;
    webPhones.add(p);
    const day=toYMD(regTime),hr=regTime.getHours();
    const excTime=excTimeMap.get(p);
    if(excTime){const diff=(excTime-regTime)/60000;if(diff>=0&&diff<600){excWaitMin.push(diff);if(!excWaitByHour[hr])excWaitByHour[hr]=[];excWaitByHour[hr].push(diff);if(!excWaitByDay[day])excWaitByDay[day]=[];excWaitByDay[day].push(diff);}}
    const winTime=winTimeMap.get(p);
    if(winTime){const diff=(winTime-regTime)/60000;if(diff>=0&&diff<600){winWaitMin.push(diff);if(!winWaitByDay[day])winWaitByDay[day]=[];winWaitByDay[day].push(diff);}}
  });
  excRows.forEach(r=>{
    const p=normalizePhone(r['Login Code']||''),d=parseDate(r['Date']),s=parseFloat(r['Total Score']);
    if(!p)return;excPhones.add(p);
    if(d&&!isNaN(s)){const day=toYMD(d),hr=d.getHours();excScoreAll.push(s);if(!excScoreByHour[hr])excScoreByHour[hr]=[];excScoreByHour[hr].push(s);if(!excScoreByDay[day])excScoreByDay[day]=[];excScoreByDay[day].push(s);}
  });
  winRows.forEach(r=>{const p=normalizePhone(r['QR Code Scan']||r['Mobile Phone']||'');if(p)winPhones.add(p);});

  const dropoffs=[];
  webPhones.forEach(p=>{if(!excPhones.has(p)&&!winPhones.has(p))dropoffs.push(p);});

  const signupsByDay={},excByDay={},winByDay={};
  webRows.forEach(r=>{const d=parseDate(r['Date']);if(d){const k=toYMD(d);signupsByDay[k]=(signupsByDay[k]||0)+1;}});
  excRows.forEach(r=>{const d=parseDate(r['Date']);if(d){const k=toYMD(d);excByDay[k]=(excByDay[k]||0)+1;}});
  winRows.forEach(r=>{const d=parseDate(r['Date']);if(d){const k=toYMD(d);winByDay[k]=(winByDay[k]||0)+1;}});

  const byHour=Array(24).fill(0),excByHour=Array(24).fill(0);
  webRows.forEach(r=>{const d=parseDate(r['Date']);if(d)byHour[d.getHours()]++;});
  excRows.forEach(r=>{const d=parseDate(r['Date']);if(d)excByHour[d.getHours()]++;});

  let peak2Hr=0,peak2Idx=0;
  for(let i=0;i<23;i++){const w=byHour[i]+(byHour[i+1]||0);if(w>peak2Hr){peak2Hr=w;peak2Idx=i;}}
  const peak2Str=fmtHour(peak2Idx)+'–'+fmtHour(peak2Idx+1);

  const regTimes=webRows.map(r=>parseDate(r['Date'])).filter(Boolean).map(d=>d.getTime());
  let throughput=null;
  if(regTimes.length>1){const span=(Math.max(...regTimes)-Math.min(...regTimes))/(1000*60*60);if(span>0)throughput=webRows.length/span;}

  return {signupsByDay,excByDay,winByDay,byHour,excByHour,excWaitMin,excWaitByHour,excWaitByDay,excScoreAll,excScoreByHour,excScoreByDay,winWaitMin,winWaitByDay,webPhones,excPhones,winPhones,dropoffs,peak2Str,peak2Hr,peak2Idx,throughput};
}

// ── DRILL DOWN ────────────────────────────────────────────────────────────────
function drillDown(day){if(selectedDay===day){clearDrillDown();return;}selectedDay=day;render();}

  const webF=filterRows(rawWeb,'Event Name');
  const excF=filterRows(rawExc,'Event Name');
  const winF=filterRows(rawWin,'Event Name');

  // ── Top KPIs ──────────────────────────────────────────────────────────────

    <div class="kpi-card"><div class="kpi-label">Completion Rate</div><div class="kpi-value">${fmtPct(excF.length,webF.length)}</div><div class="kpi-sub">${excF.length.toLocaleString()} of ${webF.length.toLocaleString()} ran EXC</div></div>

    <div class="kpi-card"><div class="kpi-label">Drop-Off Rate</div><div class="kpi-value">${fmtPct(D.dropoffs.length,webF.length)}</div><div class="kpi-sub">${D.dropoffs.length.toLocaleString()} used nothing</div></div>`;

  // ── Comparison table (2+ events) ──────────────────────────────────────────

    eventsToShow.forEach(evName=>{

        <td>${eE.length.toLocaleString()}</td>
        <td>${fmtPct(eE.length,wE.length)}</td>

        <td>${fmtMin(median(dE.winWaitMin))}</td>

        <td>${avgSc!=null?avgSc.toFixed(1):'—'}</td>
      </tr>`;
    });
    compDiv.style.display='block';
    compDiv.innerHTML=`<div class="card full" style="margin:0"><div class="card-title"><span class="dot"></span>Event Comparison Summary</div>
      <table class="comp-tbl"><thead><tr>
        <th>Event</th><th>Registrations</th><th>EXC Runs</th><th>Completion %</th>
        <th>Median Wait &rarr; EXC</th><th>Median Wait &rarr; Trivia</th><th>Drop-Off %</th><th>Avg EXC Score</th>
      </tr></thead><tbody>${rows}</tbody></table></div>`;
  } else {
    compDiv.style.display='none';
    compDiv.innerHTML='';
  }

  // ── Daily Activity Chart(s) ─────────────────────────────────────────────
  const allDays=[...new Set([...Object.keys(D.signupsByDay),...Object.keys(D.excByDay),...Object.keys(D.winByDay)])].sort();
  const dayLabels=allDays.map(d=>{const dt=new Date(d+'T12:00:00');return dt.toLocaleDateString('en-US',{month:'short',day:'numeric'});});

  const zone=document.getElementById('dailyChartZone');

  if(!comparing){
    // Single event / all — one chart with 3 lines
    zone.innerHTML=`<div class="card full">

      <div class="chart-wrap" style="min-height:220px"><canvas id="cDaily_0"></canvas></div>
      <div class="chart-note">Click any point to drill into that day</div>

    const datasets=[

      // Only show days relevant to this event

      const evLabels=evDays.map(d=>{const dt=new Date(d+'T12:00:00');return dt.toLocaleDateString('en-US',{month:'short',day:'numeric'});});

        ]},
        options:{...coBase,

  // ── Day header ────────────────────────────────────────────────────────────

  const hourLabels=Array.from({length:24},(_,i)=>i===0?'12a':i<12?i+'a':i===12?'12p':(i-12)+'p');

  document.getElementById('opsGrid').innerHTML=`
    <div class="card full">

      </div>
      <div class="chart-wrap" style="min-height:220px"><canvas id="cCascade"></canvas></div>
    </div>
    <div class="card full"><div class="card-title"><span class="dot"></span>Activity by Hour of Day &mdash; Registrations, EXC &amp; Trivia</div><div class="chart-wrap" style="min-height:200px"><canvas id="cHourly"></canvas></div></div>
    <div class="card"><div class="card-title"><span class="dot"></span>Median Wait by Day &mdash; EXC</div><div class="chart-wrap" style="min-height:200px"><canvas id="cWaitExcDay"></canvas></div></div>
    <div class="card"><div class="card-title"><span class="dot"></span>Median Wait by Day &mdash; Trivia</div><div class="chart-wrap" style="min-height:200px"><canvas id="cWaitWinDay"></canvas></div></div>
    <div class="card"><div class="card-title"><span class="dot"></span>EXC Score Distribution</div><div class="chart-wrap" style="min-height:200px"><canvas id="cScoreDist"></canvas></div></div>
    <div class="card"><div class="card-title"><span class="dot"></span>Avg EXC Score by Hour</div><div class="chart-wrap" style="min-height:200px"><canvas id="cScoreHour"></canvas></div></div>`;

  // ── Cascade chart (by day default) ────────────────────────────────────────
  window._cascadeData = { D, webF, excF, winF, allDays, dayLabels, hourLabels };
  renderCascade('day');

  // ── Hourly activity (registrations + EXC + trivia) ────────────────────────
  const winByHour = Array(24).fill(0);
  winF.forEach(r=>{ const d=parseDate(r['Date']); if(d) winByHour[d.getHours()]++; });

  opsCharts.hourly=new Chart(document.getElementById('cHourly'),{type:'bar',
    data:{labels:hourLabels,datasets:[
      {label:'Registrations',   data:D.byHour,    backgroundColor:'rgba(206,14,45,.75)', borderRadius:3},
      {label:'EXC Runs',        data:D.excByHour, backgroundColor:'rgba(88,166,255,.65)',borderRadius:3},
      {label:'Trivia Sessions', data:winByHour,   backgroundColor:'rgba(63,185,80,.65)', borderRadius:3},
    ]},
    options:{...coBase}
  });

  // ── Median wait by day — colored per event if comparing ───────────────────
  function waitDayBar(id, waitByDayObj, singleColor){
    const days=Object.keys(waitByDayObj).sort();
    const labels=days.map(d=>{const dt=new Date(d+'T12:00:00');return dt.toLocaleDateString('en-US',{month:'short',day:'numeric'});});

    let datasets;
    if(comparing){
      // One dataset per event, each in its event color
      datasets = evList.map(evName => {
        const color = eventColor(evName);
        const evWeb = rawWeb.filter(r=>(r['Event Name']||'').trim()===evName);
        const evExc = rawExc.filter(r=>(r['Event Name']||'').trim()===evName);
        const evWin = rawWin.filter(r=>(r['Event Name']||'').trim()===evName);
        const evD   = computeData(evWeb, evExc, evWin);
        const src   = id.includes('Exc') ? evD.excWaitByDay : evD.winWaitByDay;
        return {
          label: evName,
          data: days.map(d=>{ const m=median(src[d]||[]); return m!=null?+m.toFixed(1):null; }),
          backgroundColor: color+'bb',
          borderRadius: 3,
        };
      });
    } else {
      datasets=[{
        label:'Median (min)',
        data:days.map(d=>{const m=median(waitByDayObj[d]);return m!=null?+m.toFixed(1):null;}),
        backgroundColor:singleColor+'bb',borderRadius:3,
      }];
    }

    return new Chart(document.getElementById(id),{type:'bar',
      data:{labels, datasets},
      options:{...coBase,
        plugins:{...coBase.plugins,legend:{display:comparing}},
        scales:{...coBase.scales,y:{...coBase.scales.y,title:{display:true,text:'Minutes',color:'#8b949e',font:{size:10}}}}
      }
    });
  }
  opsCharts.waitExcDay = waitDayBar('cWaitExcDay', D.excWaitByDay, '#58a6ff');
  opsCharts.waitWinDay = waitDayBar('cWaitWinDay', D.winWaitByDay, '#3fb950');

  // ── Score distribution ────────────────────────────────────────────────────
  if(D.excScoreAll.length){
    const bSz=8,buckets={};for(let i=0;i<=100;i+=bSz)buckets[i]=0;
    D.excScoreAll.forEach(s=>{const b=Math.floor(s/bSz)*bSz;if(b in buckets)buckets[b]++;});
    opsCharts.scoreDist=new Chart(document.getElementById('cScoreDist'),{type:'bar',
      data:{labels:Object.keys(buckets).map(k=>k+'\u2013'+(+k+bSz)),datasets:[{label:'Participants',data:Object.values(buckets),backgroundColor:'rgba(206,14,45,.75)',borderRadius:3}]},
      options:{...coBase,plugins:{...coBase.plugins,legend:{display:false}},scales:{...coBase.scales,x:{...coBase.scales.x,ticks:{...coBase.scales.x.ticks,maxRotation:45}}}}
    });
  }

  // ── Score by hour ─────────────────────────────────────────────────────────
  const scoreHrData=Array.from({length:24},(_,i)=>{const a=avg(D.excScoreByHour[i]||[]);return a!=null?+a.toFixed(1):null;});
  opsCharts.scoreHour=new Chart(document.getElementById('cScoreHour'),{type:'line',
    data:{labels:hourLabels,datasets:[{label:'Avg EXC Score',data:scoreHrData,borderColor:'#f0a500',backgroundColor:'rgba(240,165,0,.1)',borderWidth:2,pointRadius:3,tension:.3,fill:true,spanGaps:true}]},
    options:{...coBase,plugins:{...coBase.plugins,legend:{display:false}},scales:{...coBase.scales,y:{...coBase.scales.y,min:0,max:100}}}
  });
}

// ── CASCADE CHART RENDERER ────────────────────────────────────────────────────
window._cascadeView = 'day';
function setCascadeView(view, btn){
  window._cascadeView = view;
  document.querySelectorAll('.cascade-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderCascade(view);
}

function renderCascade(view){
  if(opsCharts.cascade){ opsCharts.cascade.destroy(); delete opsCharts.cascade; }
  const cd = window._cascadeData;
  if(!cd) return;
  const { D, webF, excF, winF, allDays, dayLabels, hourLabels } = cd;
  const comparing = selectedEvents.size > 1;
  const evList = comparing ? [...selectedEvents] : null;

  // Trivia by day
  const winByDay={};
  winF.forEach(r=>{const d=parseDate(r['Date']);if(d){const k=toYMD(d);winByDay[k]=(winByDay[k]||0)+1;}});

  let labels, regData, excData, winData, datasets;

  if(view==='day'){
    labels  = dayLabels;
    regData = allDays.map(d=>D.signupsByDay[d]||0);
    excData = allDays.map(d=>D.excByDay[d]||0);
    winData = allDays.map(d=>winByDay[d]||0);
    datasets=[
      {label:'Registered',      data:regData, backgroundColor:'rgba(206,14,45,.8)',  borderRadius:3},
      {label:'Trivia Sessions', data:winData, backgroundColor:'rgba(63,185,80,.75)', borderRadius:3},
      {label:'EXC Runs',        data:excData, backgroundColor:'rgba(88,166,255,.75)',borderRadius:3},
    ];
  } else if(view==='event'){
    // One group per event (or "All" if not comparing)
    const evNames = comparing ? evList : ['All Events'];
    labels = evNames;
    datasets=[
      {label:'Registered', data:evNames.map(ev=>{
        if(ev==='All Events')return webF.length;
        return rawWeb.filter(r=>(r['Event Name']||'').trim()===ev).length;
      }), backgroundColor:'rgba(206,14,45,.8)', borderRadius:3},
      {label:'Trivia Sessions', data:evNames.map(ev=>{
        if(ev==='All Events')return winF.length;
        return rawWin.filter(r=>(r['Event Name']||'').trim()===ev).length;
      }), backgroundColor:'rgba(63,185,80,.75)', borderRadius:3},
      {label:'EXC Runs', data:evNames.map(ev=>{
        if(ev==='All Events')return excF.length;
        return rawExc.filter(r=>(r['Event Name']||'').trim()===ev).length;
      }), backgroundColor:'rgba(88,166,255,.75)', borderRadius:3},
    ];
  } else { // hour
    const winByHour=Array(24).fill(0);
    winF.forEach(r=>{const d=parseDate(r['Date']);if(d)winByHour[d.getHours()]++;});
    labels  = hourLabels;
    datasets=[
      {label:'Registered',      data:D.byHour,    backgroundColor:'rgba(206,14,45,.8)',  borderRadius:3},
      {label:'Trivia Sessions', data:winByHour,   backgroundColor:'rgba(63,185,80,.75)', borderRadius:3},
      {label:'EXC Runs',        data:D.excByHour, backgroundColor:'rgba(88,166,255,.75)',borderRadius:3},
    ];
  }

  opsCharts.cascade=new Chart(document.getElementById('cCascade'),{
    type:'bar',
    data:{labels, datasets},
    options:{...coBase,
      plugins:{...coBase.plugins,
        legend:{labels:{color:'#8b949e',font:{family:'Barlow Condensed',size:11,weight:'600'},padding:12}},
        tooltip:{callbacks:{
          afterBody: items => {
            const reg=items.find(i=>i.dataset.label==='Registered');
            const exc=items.find(i=>i.dataset.label==='EXC Runs');
            const win=items.find(i=>i.dataset.label==='Trivia Sessions');
            if(reg&&exc){
              const pct=(exc.raw/reg.raw*100).toFixed(1);
              return [`EXC completion: ${pct}%`];
            }
            return [];
          }
        }}
      }
    }
  });
}


// ── DAY DETAIL ────────────────────────────────────────────────────────────────
function renderDayDetail(day,webF,excF,winF,D){
  const webDay=webF.filter(r=>{const d=parseDate(r['Date']);return d&&toYMD(d)===day;});
  const excDay=excF.filter(r=>{const d=parseDate(r['Date']);return d&&toYMD(d)===day;});
  const winDay=winF.filter(r=>{const d=parseDate(r['Date']);return d&&toYMD(d)===day;});
  const Dd=computeData(webDay,excDay,winDay);

  const peakHrIdx=Dd.byHour.indexOf(Math.max(...Dd.byHour));
  const avgScore=avg(Dd.excScoreAll);
  const throughputStr=Dd.throughput!=null?Dd.throughput.toFixed(1)+'/hr':'—';

  document.getElementById('dayKpiRow').style.display='grid';
  document.getElementById('dayKpiRow').innerHTML=`
    <div class="kpi-card"><div class="kpi-label">Completion Rate</div><div class="kpi-value">${fmtPct(excDay.length,webDay.length)}</div><div class="kpi-sub">${excDay.length} of ${webDay.length} ran EXC</div></div>
    <div class="kpi-card accent-blue"><div class="kpi-label">Median Wait &rarr; EXC</div><div class="kpi-value">${fmtMin(median(Dd.excWaitMin))}</div><div class="kpi-sub">Registration to simulator</div></div>
    <div class="kpi-card accent-green"><div class="kpi-label">Median Wait &rarr; Trivia</div><div class="kpi-value">${fmtMin(median(Dd.winWaitMin))}</div><div class="kpi-sub">Registration to trivia</div></div>
    <div class="kpi-card accent-amber"><div class="kpi-label">Peak Hour</div><div class="kpi-value">${fmtHour(peakHrIdx)}</div><div class="kpi-sub">${Math.max(...Dd.byHour)} sign-ups</div></div>`;

  document.getElementById('dayKpiRow2').style.display='grid';
  document.getElementById('dayKpiRow2').innerHTML=`
    <div class="kpi-card accent-amber"><div class="kpi-label">Peak 2-Hour Window</div><div class="kpi-value" style="font-size:20px">${Dd.peak2Str}</div><div class="kpi-sub">${Dd.peak2Hr} sign-ups</div></div>
    <div class="kpi-card"><div class="kpi-label">Drop-Off Rate</div><div class="kpi-value">${fmtPct(Dd.dropoffs.length,webDay.length)}</div><div class="kpi-sub">${Dd.dropoffs.length} used nothing</div></div>
    <div class="kpi-card"><div class="kpi-label">Avg EXC Score</div><div class="kpi-value">${avgScore!=null?avgScore.toFixed(1):'—'}</div><div class="kpi-sub">out of 100</div></div>
    <div class="kpi-card"><div class="kpi-label">Throughput</div><div class="kpi-value">${throughputStr}</div><div class="kpi-sub">registrations per hour</div></div>`;

  document.getElementById('opsGrid').innerHTML=`
    <div class="card full"><div class="card-title"><span class="dot"></span>Hourly Activity &mdash; This Day</div><div class="chart-wrap" style="min-height:200px"><canvas id="dHourly"></canvas></div></div>
    <div class="card"><div class="card-title"><span class="dot"></span>Wait Time by Hour &mdash; Reg to EXC</div><div class="chart-wrap" style="min-height:200px"><canvas id="dWaitTrend"></canvas></div></div>
    <div class="card"><div class="card-title"><span class="dot"></span>Avg EXC Score by Hour</div><div class="chart-wrap" style="min-height:200px"><canvas id="dScoreHour"></canvas></div></div>
    <div class="card"><div class="card-title"><span class="dot"></span>EXC Score Distribution</div><div class="chart-wrap" style="min-height:200px"><canvas id="dScoreDist"></canvas></div></div>
    <div class="card"><div class="card-title"><span class="dot"></span>EXC Wait Distribution</div><div class="chart-wrap" style="min-height:200px"><canvas id="dWaitDist"></canvas></div></div>`;

  const hourLabels=Array.from({length:24},(_,i)=>i===0?'12a':i<12?i+'a':i===12?'12p':(i-12)+'p');
  opsCharts.dHourly=new Chart(document.getElementById('dHourly'),{type:'bar',data:{labels:hourLabels,datasets:[{label:'Registrations',data:Dd.byHour,backgroundColor:'rgba(206,14,45,.75)',borderRadius:3},{label:'EXC Runs',data:Dd.excByHour,backgroundColor:'rgba(88,166,255,.65)',borderRadius:3}]},options:{...coBase}});
  const waitTrend=Array.from({length:24},(_,i)=>{const m=median(Dd.excWaitByHour[i]||[]);return m!=null?+m.toFixed(1):null;});
  opsCharts.dWaitTrend=new Chart(document.getElementById('dWaitTrend'),{type:'line',data:{labels:hourLabels,datasets:[{label:'Median Wait (min)',data:waitTrend,borderColor:'#58a6ff',backgroundColor:'rgba(88,166,255,.1)',borderWidth:2,pointRadius:3,tension:.3,fill:true,spanGaps:true}]},options:{...coBase,plugins:{...coBase.plugins,legend:{display:false}},scales:{...coBase.scales,y:{...coBase.scales.y,title:{display:true,text:'Minutes',color:'#8b949e',font:{size:10}}}}}});
  const scoreHr=Array.from({length:24},(_,i)=>{const a=avg(Dd.excScoreByHour[i]||[]);return a!=null?+a.toFixed(1):null;});
  opsCharts.dScoreHour=new Chart(document.getElementById('dScoreHour'),{type:'line',data:{labels:hourLabels,datasets:[{label:'Avg EXC Score',data:scoreHr,borderColor:'#f0a500',backgroundColor:'rgba(240,165,0,.1)',borderWidth:2,pointRadius:3,tension:.3,fill:true,spanGaps:true}]},options:{...coBase,plugins:{...coBase.plugins,legend:{display:false}},scales:{...coBase.scales,y:{...coBase.scales.y,min:0,max:100}}}});
  if(Dd.excScoreAll.length){
    const bSz=8,buckets={};for(let i=0;i<=100;i+=bSz)buckets[i]=0;
    Dd.excScoreAll.forEach(s=>{const b=Math.floor(s/bSz)*bSz;if(b in buckets)buckets[b]++;});
    opsCharts.dScoreDist=new Chart(document.getElementById('dScoreDist'),{type:'bar',data:{labels:Object.keys(buckets).map(k=>k+'–'+(+k+bSz)),datasets:[{label:'Participants',data:Object.values(buckets),backgroundColor:'rgba(206,14,45,.75)',borderRadius:3}]},options:{...coBase,plugins:{...coBase.plugins,legend:{display:false}},scales:{...coBase.scales,x:{...coBase.scales.x,ticks:{...coBase.scales.x.ticks,maxRotation:45}}}}});
  }
  if(Dd.excWaitMin.length){
    const maxW=Math.min(Math.max(...Dd.excWaitMin,10),180),bSz=maxW<=60?5:10,buckets={};
    for(let i=0;i<=maxW;i+=bSz)buckets[i]=0;
    Dd.excWaitMin.forEach(w=>{const b=Math.floor(w/bSz)*bSz;const k=Object.keys(buckets).map(Number).filter(x=>x<=b).pop();if(k!==undefined)buckets[k]++;});
    opsCharts.dWaitDist=new Chart(document.getElementById('dWaitDist'),{type:'bar',data:{labels:Object.keys(buckets).map(k=>k+'–'+(+k+bSz)+'m'),datasets:[{label:'Participants',data:Object.values(buckets),backgroundColor:'rgba(88,166,255,.75)',borderRadius:3}]},options:{...coBase,plugins:{...coBase.plugins,legend:{display:false}},scales:{...coBase.scales,x:{...coBase.scales.x,ticks:{...coBase.scales.x.ticks,maxRotation:45}}}}});
  }
}
</script>
